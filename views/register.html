<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — AuthVault</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">🔐 AuthVault</a>
    <div class="navbar-links">
      <a href="/login" class="btn btn-outline">Login</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="card-header">
        <span class="icon">🚀</span>
        <h1>Create Account</h1>
        <p>Join AuthVault today</p>
      </div>

      <div class="alert alert-error" id="errorAlert"></div>
      <div class="alert alert-success" id="successAlert"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Sai Charan" />
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" />
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <button class="btn btn-primary btn-full" id="registerBtn" onclick="register()">
        Create Account
      </button>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    // ─── Password Strength ───────────────────────────────
    document.getElementById('password').addEventListener('input', function() {
      const val = this.value;
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');

      if (val.length === 0) {
        fill.style.width = '0%';
        text.textContent = '';
      } else if (val.length < 6) {
        fill.style.width = '33%';
        fill.style.background = '#ef4444';
        text.textContent = '⚠️ Too weak';
        text.style.color = '#ef4444';
      } else if (val.length < 10) {
        fill.style.width = '66%';
        fill.style.background = '#f59e0b';
        text.textContent = '⚡ Medium';
        text.style.color = '#f59e0b';
      } else {
        fill.style.width = '100%';
        fill.style.background = '#10b981';
        text.textContent = '✅ Strong';
        text.style.color = '#10b981';
      }
    });

    // ─── Register ────────────────────────────────────────
    async function register() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('registerBtn');
      const errorAlert = document.getElementById('errorAlert');
      const successAlert = document.getElementById('successAlert');

      // Hide alerts
      errorAlert.classList.remove('show');
      successAlert.classList.remove('show');

      // Validate
      if (!name || !email || !password) {
        errorAlert.textContent = '⚠️ All fields are required!';
        errorAlert.classList.add('show');
        return;
      }

      // Loading state
      btn.innerHTML = '<span class="spinner"></span> Creating Account...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          successAlert.textContent = '🎉 Account created! Redirecting to login...';
          successAlert.classList.add('show');
          setTimeout(() => window.location.href = '/login', 2000);
        } else {
          errorAlert.textContent = '❌ ' + data.message;
          errorAlert.classList.add('show');
          btn.innerHTML = 'Create Account';
          btn.disabled = false;
        }
      } catch (err) {
        errorAlert.textContent = '❌ Something went wrong. Try again.';
        errorAlert.classList.add('show');
        btn.innerHTML = 'Create Account';
        btn.disabled = false;
      }
    }

    // Allow Enter key
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') register();
    });
  </script>
</body>
</html>
