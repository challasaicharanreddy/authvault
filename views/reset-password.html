<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — AuthVault</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">🔐 AuthVault</a>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="card-header">
        <span class="icon">🔑</span>
        <h1>Reset Password</h1>
        <p>Enter your new password below</p>
      </div>

      <div class="alert alert-error" id="errorAlert"></div>
      <div class="alert alert-success" id="successAlert"></div>

      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Min 6 characters" />
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" />
      </div>

      <button class="btn btn-primary btn-full" id="resetBtn" onclick="resetPassword()">
        Reset Password
      </button>

      <div class="auth-footer">
        <a href="/login">← Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    async function resetPassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('resetBtn');
      const errorAlert = document.getElementById('errorAlert');
      const successAlert = document.getElementById('successAlert');

      errorAlert.classList.remove('show');
      successAlert.classList.remove('show');

      if (!newPassword || !confirmPassword) {
        errorAlert.textContent = '⚠️ All fields are required!';
        errorAlert.classList.add('show');
        return;
      }

      if (newPassword !== confirmPassword) {
        errorAlert.textContent = '❌ Passwords do not match!';
        errorAlert.classList.add('show');
        return;
      }

      if (newPassword.length < 6) {
        errorAlert.textContent = '❌ Password must be at least 6 characters!';
        errorAlert.classList.add('show');
        return;
      }

      // Get token and email from URL
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const email = params.get('email');

      if (!token || !email) {
        errorAlert.textContent = '❌ Invalid reset link!';
        errorAlert.classList.add('show');
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Resetting...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, newPassword })
        });

        const data = await res.json();

        if (res.ok) {
          successAlert.textContent = '✅ Password reset! Redirecting to login...';
          successAlert.classList.add('show');
          setTimeout(() => window.location.href = '/login', 2000);
        } else {
          errorAlert.textContent = '❌ ' + data.message;
          errorAlert.classList.add('show');
          btn.innerHTML = 'Reset Password';
          btn.disabled = false;
        }
      } catch (err) {
        errorAlert.textContent = '❌ Something went wrong. Try again.';
        errorAlert.classList.add('show');
        btn.innerHTML = 'Reset Password';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
