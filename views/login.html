<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AuthVault</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">🔐 AuthVault</a>
    <div class="navbar-links">
      <a href="/register" class="btn btn-primary">Register</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="card-header">
        <span class="icon">👋</span>
        <h1>Welcome Back</h1>
        <p>Sign in to your account</p>
      </div>

      <div class="alert alert-error" id="errorAlert"></div>
      <div class="alert alert-success" id="successAlert"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" />
      </div>

      <div style="text-align: right; margin-bottom: 1.25rem; margin-top: -0.75rem;">
        <a href="/forgot-password" style="color: var(--accent); font-size: 0.85rem; text-decoration: none;">
          Forgot password?
        </a>
      </div>

      <button class="btn btn-primary btn-full" id="loginBtn" onclick="login()">
        Sign In
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorAlert = document.getElementById('errorAlert');
      const successAlert = document.getElementById('successAlert');

      errorAlert.classList.remove('show');
      successAlert.classList.remove('show');

      if (!email || !password) {
        errorAlert.textContent = '⚠️ All fields are required!';
        errorAlert.classList.add('show');
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Signing In...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          // Save access token
          localStorage.setItem('accessToken', data.accessToken);
          localStorage.setItem('user', JSON.stringify(data.user));

          successAlert.textContent = '✅ Login successful! Redirecting...';
          successAlert.classList.add('show');
          setTimeout(() => window.location.href = '/dashboard', 1500);
        } else {
          errorAlert.textContent = '❌ ' + data.message;
          errorAlert.classList.add('show');
          btn.innerHTML = 'Sign In';
          btn.disabled = false;
        }
      } catch (err) {
        errorAlert.textContent = '❌ Something went wrong. Try again.';
        errorAlert.classList.add('show');
        btn.innerHTML = 'Sign In';
        btn.disabled = false;
      }
    }

    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
